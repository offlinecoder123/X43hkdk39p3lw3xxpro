<![CDATA[ <!DOCTYPE html> <html lang="en-us"> <head> <meta charset="utf-8"/> <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/> <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/> <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/z799gs/c2@main/style.css"/> <style> canvas:focus { outline: none; } #loading-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 999; } .spinner { border: 4px solid rgba(255, 255, 255, 0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin-top: 20px; } @keyframes spin { 100% { transform: rotate(360deg); } } #status-text { color: #aaa; margin-top: 15px; font-size: 13px; letter-spacing: 1px; } </style> </head> <body> <div id="unity-container"><canvas id="unity-canvas"></canvas></div> <div id="loading-cover"> <div id="unity-logo"><h2 style="color:white;">LOADING GAME - Classroom Resources</h2></div> <div class="spinner"></div> <div id="status-text">Synchronizing Environment...</div> </div> <script> // --- CRITICAL GLOBAL DATA --- var ysdk = null; var myGameInstance = null; var environmentData = JSON.stringify({ language: "en", domain: "default", deviceType: "desktop", isMobile: false, isDesktop: true, appID: "fps_build", browserLang: "en" }); var playerData = JSON.stringify({ playerAuth: "resolved", playerName: "Guest Player", playerId: "12345", playerPhoto: "null", payingStatus: "free" }); var cloudSaves = 'noData'; var paymentsData = 'none'; // --- ALL SDK FUNCTIONS (Empty/Mock to prevent ReferenceErrors) --- // Initialization function InitYSDK() { console.log("SDK: Initialized"); } function InitGame() { console.log("Game: Ready"); } // Data Requests function InitPlayer(sendback) { if (sendback && myGameInstance) myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', playerData); return playerData; } function RequestingEnvironmentData(sendback) { if (sendback && myGameInstance) myGameInstance.SendMessage('YandexGame', 'SetEnvirData', environmentData); return environmentData; } // --- PAYMENT SYSTEM (Fixed the GetPayments error) --- function GetPayments() { console.log("SDK: Payments requested"); if (myGameInstance) myGameInstance.SendMessage('YandexGame', 'PaymentsEntries', 'none'); return "none"; } function BuyPayments(id) { console.log("SDK: Purchase attempt: " + id); } function ConsumePurchase(token) { console.log("SDK: Consuming: " + token); } // Ads Logic function FullAdShow() { console.log("SDK: Interstitial Show"); if (myGameInstance) { myGameInstance.SendMessage('YandexGame', 'OpenFullAd'); setTimeout(() => myGameInstance.SendMessage('YandexGame', 'CloseFullAd', 'true'), 300); } } function RewardedShow(id) { console.log("SDK: Rewarded Show ID: " + id); if (myGameInstance) { myGameInstance.SendMessage('YandexGame', 'OpenVideo'); setTimeout(() => { myGameInstance.SendMessage('YandexGame', 'RewardVideo', id); myGameInstance.SendMessage('YandexGame', 'CloseVideo'); }, 500); } } function StickyAdActivity(show) { console.log("SDK: Sticky Ad State: " + show); } // Cloud Storage function SaveCloud(data, flush) { console.log("SDK: Data Saved to Cloud"); } function LoadCloud() { if (myGameInstance) myGameInstance.SendMessage('YandexGame', 'SetLoadSaves', cloudSaves); return cloudSaves; } // Leaderboards function InitLeaderboards() { } function GetLeaderboardScores(name, max, top, around, size, auth) { if (myGameInstance) { let data = JSON.stringify({technoName: name, entries: "No Data"}); myGameInstance.SendMessage('YandexGame', 'LeaderboardEntries', data); } } function SetLeaderboardScores(name, score) { } // Social / UI function Review() { console.log("SDK: Review requested"); } function PromptShow() { console.log("SDK: Shortcut prompt"); } function URLReady() { return window.location.href; } // --- LOADER CONFIGURATION --- const buildUrl = "https://cdn.jsdelivr.net/gh/z799gs/c2@main/Build"; const loaderUrl = buildUrl + "/CS2Teams.loader.js"; const DATA_PARTS = 4; const WASM_PARTS = 4; const canvas = document.querySelector("#unity-canvas"); const loadingCover = document.querySelector("#loading-cover"); const statusText = document.querySelector("#status-text"); async function MergeAndLoad(baseUrl, count, type) { const parts = []; for (let i = 0; i < count; i++) { const res = await fetch(`${baseUrl}.${i}`); if (!res.ok) throw new Error("Missing part " + i); parts.push(await res.arrayBuffer()); } const blob = new Blob(parts, { type: type }); return URL.createObjectURL(blob); } async function StartApp() { try { statusText.innerText = "Downloading Content..."; const [dataUrl, wasmUrl] = await Promise.all([ MergeAndLoad(buildUrl + "/CS2Teams.data.br", DATA_PARTS, "application/octet-stream"), MergeAndLoad(buildUrl + "/CS2Teams.wasm.br", WASM_PARTS, "application/wasm") ]); const config = { dataUrl: dataUrl, frameworkUrl: buildUrl + "/CS2Teams.framework.js", codeUrl: wasmUrl, streamingAssetsUrl: "StreamingAssets", companyName: "DefaultCompany", productName: "FPS_Shooter", productVersion: "1.0", }; const script = document.createElement("script"); script.src = loaderUrl; script.onload = () => { createUnityInstance(canvas, config, (p) => { statusText.innerText = "Loading: " + Math.round(p * 100) + "%"; }).then((instance) => { myGameInstance = instance; loadingCover.style.display = "none"; }); }; document.body.appendChild(script); } catch (err) { statusText.innerText = "Load Failed. Check Console."; console.error(err); } } window.onload = StartApp; </script> <!-- Sticky Bottom Center Ad (728x90) with Smooth Slide-Out and Reappearance --> <style> /* Container: Bottom center, fixed, with overflow hidden */ #ad-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: min(728px, calc(100% - 20px)); /* 728px, 10px margin on mobile */ height: 90px; background: rgba(0, 0, 0, 0.90); display: none; z-index: 99999; border-radius: 0; /* Sharp corners */ overflow: hidden; box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.45); box-sizing: border-box; transition: transform 0.5s ease-in-out; /* Smooth slide-in/out animation */ } /* Slide-out animation */ #ad-container.hidden { transform: translate(-50%, 100%); /* Slide down out of view */ } #ad-iframe { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 745px; /* Updated width */ height: 90px; /* Updated height */ border: 0; display: block; overflow: hidden; pointer-events: auto; box-sizing: content-box; -ms-overflow-style: none; scrollbar-width: none; } #ad-iframe::-webkit-scrollbar { display: none; width: 0; height: 0; } /* Close button with arrow */ #close-ad { position: absolute; top: 6px; right: 8px; background: #ff4d4d; color: #fff; border: none; padding: 5px 9px; font-size: 13px; border-radius: 4px; cursor: not-allowed; opacity: 0.72; z-index: 100000; display: flex; align-items: center; } #close-ad.enabled { cursor: pointer; opacity: 1; } #close-ad::before { content: '↓'; /* Down arrow for bottom ad */ margin-right: 4px; } /* Right mask for scrollbar */ #ad-right-mask { position: absolute; top: 0; right: 0; width: 12px; height: 100%; pointer-events: none; background: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.9)); z-index: 99999; } /* Mobile adjustments */ @media (max-width: 440px) { #ad-container { width: calc(100% - 12px); left: 50%; transform: translateX(-50%); border-radius: 0; /* Sharp corners on mobile */ } #ad-iframe { width: 728px; } } </style> <div id="ad-container" aria-hidden="true" role="dialog" aria-label="Advertisement"> <iframe id="ad-iframe" src="https://script.google.com/macros/s/AKfycbw60Tp6nuqThxAuU8ZN1JIuPtjHoW2Uqq3fQy0CvrycN0O2AQwhRT5EDv73hh2FhXEF/exec" width="768px" height="95px" scrolling="no" frameborder="0" sandbox="allow-scripts allow-popups allow-same-origin" ></iframe> <button id="close-ad" disabled>Close (12)</button> <div id="ad-right-mask"></div> </div> <script> (function () { const showDelay = 2000; // 2 seconds delay before first show const countdownStart = 12; // 12 seconds countdown const reappearDelay = 150000; // 25 seconds before reappearance const adContainer = document.getElementById('ad-container'); const closeBtn = document.getElementById('close-ad'); function showAd() { // Show ad with smooth slide-in adContainer.style.display = 'block'; adContainer.classList.remove('hidden'); adContainer.setAttribute('aria-hidden', 'false'); // Start countdown let timeLeft = countdownStart; closeBtn.textContent = `Close (${timeLeft})`; closeBtn.disabled = true; closeBtn.classList.remove('enabled'); const t = setInterval(() => { timeLeft--; if (timeLeft > 0) { closeBtn.textContent = `Close (${timeLeft})`; } else { clearInterval(t); closeBtn.disabled = false; closeBtn.classList.add('enabled'); closeBtn.textContent = 'Close ↓'; } }, 1000); } // Initial ad show setTimeout(showAd, showDelay); // Close with animation and schedule reappearance closeBtn.addEventListener('click', () => { if (closeBtn.disabled) return; adContainer.classList.add('hidden'); adContainer.setAttribute('aria-hidden', 'true'); // Schedule reappearance without removing or reloading iframe setTimeout(showAd, reappearDelay); }); })(); </script> </body> </html> ]]>
